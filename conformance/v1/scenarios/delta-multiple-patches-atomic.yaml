name: delta-multiple-patches-atomic
description: A delta frame with multiple patches applies all-or-nothing. Patches order is left-to-right.
tag: required
target: runtime
spec_refs:
  - LSDP-1#3.2-delta

steps:
  - kind: client-sends
    frame:
      v: 1
      type: subscribe
      token: $TOKEN_OPERATOR

  - kind: server-sends
    frame:
      v: 1
      type: snapshot
      seq: 1
      scene_id: t
      scene_version: sha256:f1d2d2f924e986ac86fdf7b36c94bcdf32beec15c3aef0d27b6bc8f8a90b9e3f
      state:
        a: 0
        b: 0
        c: 0

  - kind: server-sends
    frame:
      v: 1
      type: delta
      seq: 2
      patches:
        - { path: a, value: 1 }
        - { path: b, value: 2 }
        - { path: c, value: 3 }

  - kind: expect-runtime-state
    state:
      a: 1
      b: 2
      c: 3
