name: error-path-on-unknown-path
description: UNKNOWN_PATH error frames MUST carry the `path` field per LSDP/1.0.1 §3.4.1. Asserts the offending path is echoed back to the client.
tag: required
target: server
spec_refs:
  - LSDP-1#341-per-code-extra-fields
  - ERROR-CODES#unknown_path

bundles:
  - id: title-bundle
    inline:
      lsml: "1.0"
      scene_id: t
      scene_version: sha256:c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1
      layout:
        kind: text
        bind: { value: "__inputs.title" }
      operator_inputs:
        - path: "__inputs.title"
          label: Title
          type: string
          writable_by: [operator]
      defaults:
        "__inputs.title": ""

steps:
  - kind: client-sends
    frame:
      v: 1
      type: subscribe
      token: $TOKEN_OPERATOR

  - kind: server-sends
    frame:
      v: 1
      type: snapshot
      seq: 1
      scene_id: t
      scene_version: $ANY_HASH
      state:
        "__inputs.title": ""

  - kind: client-sends
    frame:
      v: 1
      type: input
      patches:
        - { path: "__inputs.does_not_exist", value: 42 }

  - kind: server-sends
    frame:
      v: 1
      type: error
      seq: $ANY
      code: UNKNOWN_PATH
      message: $ANY
      recoverable: true
      path: "__inputs.does_not_exist"
