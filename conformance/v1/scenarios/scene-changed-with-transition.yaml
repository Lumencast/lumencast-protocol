name: scene-changed-with-transition
description: 1.1+ A `scene_changed` frame MAY carry a show-level `transition` directive (`crossfade`, future kinds). The runtime SHOULD use it between the old and new scene trees. Runtimes that do not recognise the kind fall back to the default crossfade. (LSDP/1.1 §3.3.1).
tag: required
target: runtime
spec_refs:
  - LSDP-1#331-show-level-transition-11

steps:
  - kind: client-sends
    frame:
      v: 1
      type: subscribe
      token: $TOKEN_VIEWER

  - kind: server-sends
    frame:
      v: 1
      type: snapshot
      seq: 1
      scene_id: scene-a
      scene_version: $ANY_HASH
      state: $ANY

  - kind: server-sends
    frame:
      v: 1
      type: scene_changed
      seq: 2
      scene_id: scene-b
      scene_version: sha256:b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0
      from_scene_id: scene-a
      transition:
        kind: crossfade
        duration_ms: 600

  # The runtime MUST request the new scene's bundle.
  - kind: expect-client-action
    action: fetch-bundle
    scene_version: sha256:b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0b0

  # And start a fresh sequence.
  - kind: server-sends
    frame:
      v: 1
      type: snapshot
      seq: 1
      scene_id: scene-b
      scene_version: $ANY_HASH
      state: $ANY
