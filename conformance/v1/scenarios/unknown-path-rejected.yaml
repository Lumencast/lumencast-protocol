name: unknown-path-rejected
description: Input frame referencing a path not declared in operator_inputs is rejected with UNKNOWN_PATH. No patches are applied (atomic).
tag: required
target: server
spec_refs:
  - LSDP-1#4.2-input
  - LSDP-1#11-error-handling
  - ERROR-CODES#unknown_path

steps:
  - kind: client-sends
    frame:
      v: 1
      type: subscribe
      token: $TOKEN_OPERATOR

  - kind: server-sends
    frame:
      v: 1
      type: snapshot
      seq: 1
      scene_id: $ANY
      scene_version: $ANY_HASH
      state:
        "__inputs.title": Hello

  - kind: client-sends
    frame:
      v: 1
      type: input
      patches:
        - { path: "__inputs.title", value: "Updated" }
        - { path: "__inputs.does_not_exist", value: 42 }

  - kind: server-sends
    frame:
      v: 1
      type: error
      seq: $ANY
      code: UNKNOWN_PATH
      message: $ANY
      recoverable: true

  # Atomic — title MUST NOT have been updated.
  - kind: expect-server-state
    state:
      "__inputs.title": Hello
