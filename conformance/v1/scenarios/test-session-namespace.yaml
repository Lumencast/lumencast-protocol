name: test-session-namespace
description: Test-role connections can only write to __test.* paths. Attempts to write __inputs.* are rejected with WRITE_FORBIDDEN.
tag: required
target: server
spec_refs:
  - LSDP-1#9-roles--write-authority
  - LSDP-1#10-reserved-namespaces

steps:
  - kind: client-sends
    frame:
      v: 1
      type: subscribe
      token: $TOKEN_TEST
      scene: test-scene
      session: 00000000-0000-0000-0000-000000000001

  - kind: server-sends
    frame:
      v: 1
      type: snapshot
      seq: 1
      scene_id: test-scene
      scene_version: $ANY_HASH
      state: {}

  # Test role MAY write to __test.*
  - kind: client-sends
    frame:
      v: 1
      type: input
      patches:
        - { path: "__test.mock_score", value: 42 }

  - kind: server-sends
    frame:
      v: 1
      type: delta
      seq: 2
      patches:
        - { path: "__test.mock_score", value: 42 }

  # Test role MUST NOT write to __inputs.*
  - kind: client-sends
    frame:
      v: 1
      type: input
      patches:
        - { path: "__inputs.title", value: "via test session" }

  - kind: server-sends
    frame:
      v: 1
      type: error
      seq: $ANY
      code: WRITE_FORBIDDEN
      message: $ANY
      recoverable: true
