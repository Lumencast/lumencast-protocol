name: error-path-on-write-forbidden
description: WRITE_FORBIDDEN error frames MUST carry the `path` field per LSDP/1.0.1 §3.4.1. Same shape as viewer-cannot-input but asserts the path field explicitly.
tag: required
target: server
spec_refs:
  - LSDP-1#341-per-code-extra-fields
  - ERROR-CODES#write_forbidden

steps:
  - kind: client-sends
    frame:
      v: 1
      type: subscribe
      token: $TOKEN_VIEWER

  - kind: server-sends
    frame:
      v: 1
      type: snapshot
      seq: 1
      scene_id: $ANY
      scene_version: $ANY_HASH
      state: {}

  - kind: client-sends
    frame:
      v: 1
      type: input
      patches:
        - { path: "__inputs.title", value: "Hacker" }

  - kind: server-sends
    frame:
      v: 1
      type: error
      seq: $ANY
      code: WRITE_FORBIDDEN
      message: $ANY
      recoverable: true
      path: "__inputs.title"
