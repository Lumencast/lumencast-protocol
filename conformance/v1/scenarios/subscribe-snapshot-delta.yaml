name: subscribe-snapshot-delta
description: Basic happy path. Client subscribes, server emits snapshot at seq=1, deltas follow.
tag: required
target: any
spec_refs:
  - LSDP-1#3.1-snapshot
  - LSDP-1#3.2-delta
  - LSDP-1#6-subscription-lifecycle

steps:
  - kind: client-sends
    frame:
      v: 1
      type: subscribe
      token: $TOKEN_OPERATOR

  - kind: server-sends
    frame:
      v: 1
      type: snapshot
      seq: 1
      scene_id: t
      scene_version: sha256:f1d2d2f924e986ac86fdf7b36c94bcdf32beec15c3aef0d27b6bc8f8a90b9e3f
      state:
        title: Hello
        count: 0

  - kind: expect-runtime-state
    state:
      title: Hello
      count: 0

  - kind: server-emits
    frame:
      v: 1
      type: delta
      seq: 2
      patches:
        - { path: count, value: 1 }

  - kind: expect-runtime-state
    state:
      title: Hello
      count: 1

  - kind: server-emits
    frame:
      v: 1
      type: delta
      seq: 3
      patches:
        - { path: count, value: 2 }
        - { path: title, value: Updated }

  - kind: expect-runtime-state
    state:
      title: Updated
      count: 2
