name: seq-gap-triggers-reconnect
description: Runtime detects a sequence gap (missing seq), closes the WS with VERSION_GAP, and reconnects. After reconnect, fresh snapshot replaces state.
tag: required
target: runtime
spec_refs:
  - LSDP-1#5-sequencing
  - LSDP-1#7-reconnection

steps:
  - kind: client-sends
    frame:
      v: 1
      type: subscribe
      token: $TOKEN_OPERATOR

  - kind: server-sends
    frame:
      v: 1
      type: snapshot
      seq: 1
      scene_id: t
      scene_version: sha256:f1d2d2f924e986ac86fdf7b36c94bcdf32beec15c3aef0d27b6bc8f8a90b9e3f
      state:
        x: 1

  - kind: server-sends
    frame:
      v: 1
      type: delta
      seq: 2
      patches:
        - { path: x, value: 2 }

  # Skip seq 3 — emit seq 5. Runtime should detect gap.
  - kind: server-sends
    frame:
      v: 1
      type: delta
      seq: 5
      patches:
        - { path: x, value: 5 }

  - kind: expect-client-action
    action: close-with-reason
    reason: VERSION_GAP

  - kind: expect-client-action
    action: reconnect

  - kind: client-sends
    frame:
      v: 1
      type: subscribe
      token: $TOKEN_OPERATOR

  - kind: server-sends
    frame:
      v: 1
      type: snapshot
      seq: 1
      scene_id: t
      scene_version: sha256:f1d2d2f924e986ac86fdf7b36c94bcdf32beec15c3aef0d27b6bc8f8a90b9e3f
      state:
        x: 5

  - kind: expect-runtime-state
    state:
      x: 5
