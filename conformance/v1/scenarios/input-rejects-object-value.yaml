name: input-rejects-object-value
description: LSDP/1 §3.2.1 forbids JSON objects as `value` types in delta and input patches. The server MUST reject an input frame carrying an object value with INVALID_VALUE and apply no patches.
tag: required
target: server
spec_refs:
  - LSDP-1#321-allowed-value-types
  - ERROR-CODES#invalid_value

bundles:
  - id: title-bundle
    inline:
      lsml: "1.0"
      scene_id: t
      scene_version: sha256:c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1
      layout:
        kind: text
        bind: { value: "__inputs.title" }
      operator_inputs:
        - path: "__inputs.title"
          label: Title
          type: string
          writable_by: [operator]
      defaults:
        "__inputs.title": ""

steps:
  - kind: client-sends
    frame:
      v: 1
      type: subscribe
      token: $TOKEN_OPERATOR

  - kind: server-sends
    frame:
      v: 1
      type: snapshot
      seq: 1
      scene_id: t
      scene_version: $ANY_HASH
      state:
        "__inputs.title": ""

  # Send an input whose value is an object — forbidden per §3.2.1.
  - kind: client-sends
    frame:
      v: 1
      type: input
      patches:
        - path: "__inputs.title"
          value: { r: 255, g: 0, b: 0 }

  - kind: server-sends
    frame:
      v: 1
      type: error
      seq: $ANY
      code: INVALID_VALUE
      message: $ANY
      recoverable: true
      path: "__inputs.title"

  # Atomic — the title MUST NOT have been overwritten.
  - kind: expect-server-state
    state:
      "__inputs.title": ""
