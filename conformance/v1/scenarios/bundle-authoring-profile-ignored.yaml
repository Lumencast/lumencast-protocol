name: bundle-authoring-profile-ignored
description: "LSML 1.1+ A bundle declaring an authoring profile (identifier ending in `.authoring/<major>`, here `x-figma.authoring/1`) plus a per-primitive `metadata.<vendor>.*` block validates structurally even when the runtime does not advertise support. Authoring profiles are advisory per §17.5.1 — runtimes MUST NOT reject when the profile is unsupported, in contrast with behavioural profiles tested by `bundle-unsupported-profile-rejected`. (LSML 1.1 §17.4, §17.5)."
tag: recommended
target: server
spec_refs:
  - LSML-1#175-authoring-profiles
  - LSML-1#174-the-metadata-field-universal-escape-hatch

bundles:
  - id: figma-authored-bundle
    inline:
      $schema: https://lumencast.dev/schema/lsml/1.1/schema.json
      lsml: "1.1"
      scene_id: figma-authored
      scene_version: sha256:f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1
      profiles:
        - x-figma.authoring/1
      metadata:
        author: alice
        x-figma.tool_version: "0.2.0"
      layout:
        kind: frame
        size: { w: 1920, h: 1080 }
        background: "#0d0d1a"
        metadata:
          figma:
            layerName: "Hero scene"
            effects:
              - type: DROP_SHADOW
                visible: true
                color: { r: 0, g: 0, b: 0, a: 0.25 }
                offset: { x: 0, y: 4 }
                radius: 2
                spread: 0
                blendMode: NORMAL
        children:
          - kind: text
            bind: { value: title }
            position: { x: 80, y: 60 }
            style:
              fontSize: 48
              fontWeight: 700
              color: "#ffffff"
              textTransform: uppercase
            metadata:
              figma:
                layerName: "Title text"
                blendMode: NORMAL
                fontStyle: "Bold"
                textAutoResize: HEIGHT
          - kind: shape
            geometry: rect
            size: { w: 600, h: 400 }
            position: { x: 660, y: 340 }
            cornerRadius: 24
            fill: "#ff7e00"
            metadata:
              figma:
                layerName: "Hero card"
                cornerRadii: [24, 24, 0, 0]
                cornerSmoothing: 0.6
                strokeDetails:
                  dashPattern: [8, 4]
                  strokeJoin: ROUND
                  strokeAlign: INSIDE
                blendMode: NORMAL
                effects:
                  - type: BACKGROUND_BLUR
                    visible: true
                    radius: 12
      defaults:
        title: "Hello"

steps:
  - kind: client-sends
    frame:
      v: 1
      type: subscribe
      token: $TOKEN_OPERATOR

  - kind: server-sends
    frame:
      v: 1
      type: snapshot
      seq: 1
      scene_id: figma-authored
      scene_version: $ANY_HASH
      state: $ANY
