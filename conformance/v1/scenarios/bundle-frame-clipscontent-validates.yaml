name: bundle-frame-clipscontent-validates
description: "LSML 1.1+ A `frame` declaring `clipsContent: false` is structurally valid. The default (true) clips children that overflow the declared size ; false allows children to render past the boundary without auto-growing the frame. Schema-level coverage. (LSML 1.1 §4.3)."
tag: recommended
target: server
spec_refs:
  - LSML-1#43-frame

bundles:
  - id: noclip-bundle
    inline:
      $schema: https://lumencast.dev/schema/lsml/1.1/schema.json
      lsml: "1.1"
      scene_id: noclip
      scene_version: sha256:3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c
      layout:
        kind: frame
        size: { w: 400, h: 200 }
        clipsContent: false
        background: "#1a1a2e"
        children:
          - kind: shape
            geometry: circle
            size: { w: 80, h: 80 }
            position: { x: 360, y: 160 }
            fill: "#ff1a3d"
            ariaLabel: Badge sticking out of the frame

steps:
  - kind: client-sends
    frame:
      v: 1
      type: subscribe
      token: $TOKEN_OPERATOR

  - kind: server-sends
    frame:
      v: 1
      type: snapshot
      seq: 1
      scene_id: noclip
      scene_version: $ANY_HASH
      state: $ANY
