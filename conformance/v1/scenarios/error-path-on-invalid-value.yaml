name: error-path-on-invalid-value
description: INVALID_VALUE error frames MUST carry the `path` field per LSDP/1.0.1 §3.4.1. Asserts the constraint-violating path is echoed back to the client.
tag: required
target: server
spec_refs:
  - LSDP-1#341-per-code-extra-fields
  - ERROR-CODES#invalid_value
  - LSML-1#81-constraint-vocabulary

bundles:
  - id: title-bundle
    inline:
      lsml: "1.0"
      scene_id: t
      scene_version: sha256:c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1c1
      layout:
        kind: text
        bind: { value: "__inputs.title" }
      operator_inputs:
        - path: "__inputs.title"
          label: Title
          type: string
          constraints: { maxLength: 5 }
          writable_by: [operator]
      defaults:
        "__inputs.title": ""

steps:
  - kind: client-sends
    frame:
      v: 1
      type: subscribe
      token: $TOKEN_OPERATOR

  - kind: server-sends
    frame:
      v: 1
      type: snapshot
      seq: 1
      scene_id: t
      scene_version: $ANY_HASH
      state:
        "__inputs.title": ""

  - kind: client-sends
    frame:
      v: 1
      type: input
      patches:
        - { path: "__inputs.title", value: "this is way too long" }

  - kind: server-sends
    frame:
      v: 1
      type: error
      seq: $ANY
      code: INVALID_VALUE
      message: $ANY
      recoverable: true
      path: "__inputs.title"
