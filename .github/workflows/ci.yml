name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md
            !node_modules

  json-validate:
    name: JSON validation
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Validate every JSON file parses
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' file; do
            if ! python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$file" 2>/dev/null; then
              echo "::error file=$file::invalid JSON"
              fail=1
            else
              echo "ok: $file"
            fi
          done < <(find . -type f -name '*.json' -not -path './node_modules/*' -print0)
          exit "$fail"

  schema-meta-validate:
    name: Schema meta-validation
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install jsonschema
        run: pip install --upgrade pip 'jsonschema>=4.18'
      - name: Meta-validate every JSON Schema against draft-2020-12
        run: |
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          import jsonschema
          fail = 0
          targets = [
              Path("spec/schema.json"),
              Path("spec/schema-frames.json"),
              *sorted(Path("spec/adapters").glob("*.json")),
          ]
          meta = jsonschema.Draft202012Validator.META_SCHEMA
          for t in targets:
              schema = json.loads(t.read_text(encoding="utf-8"))
              errs = list(jsonschema.Draft202012Validator(meta).iter_errors(schema))
              if errs:
                  fail += 1
                  print(f"  FAIL {t}: {len(errs)} meta-validation error(s)")
                  for e in errs[:3]:
                      print(f"    -> {e.message}")
              else:
                  print(f"  OK   {t}")
          sys.exit(fail)
          PY

  schema-validate-examples:
    name: LSML examples validate
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install jsonschema + referencing
        run: pip install --upgrade pip 'jsonschema>=4.18' referencing
      - name: Validate spec/examples/*.lsml against spec/schema.json
        run: python scripts/validate-bundle.py spec/examples/*.lsml

  link-check:
    name: Internal link check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Internal links only — external URL flake should not break CI.
          # `--offline` skips network; we just verify file references.
          args: >-
            --offline
            --no-progress
            --include-fragments
            './**/*.md'
          fail: true

  codeowners-check:
    name: CODEOWNERS present
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4
      - name: Verify CODEOWNERS exists
        run: |
          if [ ! -f .github/CODEOWNERS ] && [ ! -f CODEOWNERS ]; then
            echo "::error::CODEOWNERS file missing"
            exit 1
          fi
          echo "CODEOWNERS found"
