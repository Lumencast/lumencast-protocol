name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md
            !node_modules

  json-validate:
    name: JSON validation
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Validate every JSON file parses
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' file; do
            if ! python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$file" 2>/dev/null; then
              echo "::error file=$file::invalid JSON"
              fail=1
            else
              echo "ok: $file"
            fi
          done < <(find . -type f -name '*.json' -not -path './node_modules/*' -print0)
          exit "$fail"

  schema-validate-examples:
    name: LSML examples validate
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install jsonschema
        run: pip install --upgrade pip jsonschema
      - name: Validate spec/examples/*.lsml against spec/schema.json
        run: python scripts/validate-bundle.py spec/examples/*.lsml

  link-check:
    name: Internal link check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Internal links only — external URL flake should not break CI.
          # `--offline` skips network; we just verify file references.
          args: >-
            --offline
            --no-progress
            --include-fragments
            './**/*.md'
          fail: true

  codeowners-check:
    name: CODEOWNERS present
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4
      - name: Verify CODEOWNERS exists
        run: |
          if [ ! -f .github/CODEOWNERS ] && [ ! -f CODEOWNERS ]; then
            echo "::error::CODEOWNERS file missing"
            exit 1
          fi
          echo "CODEOWNERS found"
